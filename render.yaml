services:
  - type: web
    name: dtp-web-tracker
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: NODE_VERSION
        value: 20
    disk:
      name: dtp-data
      mountPath: /var/data
      sizeGB: 1
